services:
  db:
    image: postgres:17
    container_name: eixo_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eixo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: eixo_erp
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - eixo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eixo -d eixo_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  erp:
    image: ghcr.io/eixoglobal/eixoglobal-erp:latest
    container_name: eixo_erp_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://eixo:${POSTGRES_PASSWORD}@db:5432/eixo_erp
      SESSION_SECRET: ${SESSION_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NEXT_PUBLIC_APP_URL: https://erp.eixoglobal.com.br
      NEXT_PUBLIC_APP_NAME: Eixo Global ERP
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: "0.0.0.0"
      D4SIGN_TOKEN_API: ${D4SIGN_TOKEN_API}
      D4SIGN_CRYPT_KEY: ${D4SIGN_CRYPT_KEY}
      D4SIGN_SAFE_UUID: ${D4SIGN_SAFE_UUID}
      D4SIGN_WEBHOOK_SECRET: ${D4SIGN_WEBHOOK_SECRET}
      D4SIGN_BASE_URL: https://secure.d4sign.com.br/api/v1
      UPLOAD_MAX_SIZE: 10485760
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/public/uploads
    networks:
      - eixo_network

volumes:
  pgdata:
  uploads:

networks:
  eixo_network:
    driver: bridge
