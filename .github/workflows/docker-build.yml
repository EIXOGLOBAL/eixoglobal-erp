name: Build e Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/eixoglobal/eixoglobal-erp:latest
            ghcr.io/eixoglobal/eixoglobal-erp:${{ github.sha }}

      - name: Atualizar IMAGE_TAG no Dokploy
        env:
          DOKPLOY_COMPOSE_ENV: ${{ secrets.DOKPLOY_COMPOSE_ENV }}
        run: |
          ENV_BLOCK="${DOKPLOY_COMPOSE_ENV}
          IMAGE_TAG=${{ github.sha }}"
          jq -n --arg id "${{ secrets.DOKPLOY_COMPOSE_ID }}" --arg env "$ENV_BLOCK" \
            '{composeId:$id, env:$env}' > payload.json
          curl -sX POST "${{ secrets.DOKPLOY_URL }}/api/compose.update" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            --data @payload.json

      - name: Deploy no Dokploy
        run: |
          curl -X POST "${{ secrets.DOKPLOY_URL }}/api/compose.deploy" \
            -H "accept: application/json" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -d '{"composeId": "${{ secrets.DOKPLOY_COMPOSE_ID }}"}'
