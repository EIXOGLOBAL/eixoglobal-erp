name: Build e Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/eixoglobal/eixoglobal-erp:latest
            ghcr.io/eixoglobal/eixoglobal-erp:${{ github.sha }}

      - name: Atualizar IMAGE_TAG no Dokploy (preserva env existente)
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          NEW_SHA="${{ github.sha }}"

          # 1. Busca o env atual via tRPC
          ENCODED_INPUT=$(python3 -c "import urllib.parse,json; print(urllib.parse.quote(json.dumps({'json':{'composeId':'${DOKPLOY_COMPOSE_ID}'}})))")
          CURRENT_ENV=$(curl -s \
            "${DOKPLOY_URL}/api/trpc/compose.one?input=${ENCODED_INPUT}" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            --connect-timeout 15 --max-time 30 | \
            jq -r '.result.data.json.env // ""')

          if [ -z "$CURRENT_ENV" ]; then
            echo "Nao foi possivel buscar env atual. Abortando para nao sobrescrever variaveis."
            exit 1
          fi

          echo "Env atual recuperado ($(echo "$CURRENT_ENV" | wc -l) linhas)"

          # 2. Substitui IMAGE_TAG preservando todas as outras variaveis
          UPDATED_ENV=$(printf '%s' "$CURRENT_ENV" | grep -v "^IMAGE_TAG=")
          UPDATED_ENV="${UPDATED_ENV}"$'\n'"IMAGE_TAG=${NEW_SHA}"

          # 3. Monta payload e atualiza
          PAYLOAD=$(jq -n \
            --arg id "${DOKPLOY_COMPOSE_ID}" \
            --arg env "${UPDATED_ENV}" \
            '{"json":{"composeId":$id,"env":$env}}')

          for i in 1 2 3; do
            RESULT=$(curl -s -X POST \
              "${DOKPLOY_URL}/api/trpc/compose.update" \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${DOKPLOY_API_KEY}" \
              --connect-timeout 15 --max-time 60 \
              -d "$PAYLOAD")

            if echo "$RESULT" | jq -e '.result' > /dev/null 2>&1; then
              echo "IMAGE_TAG atualizado para ${NEW_SHA:0:7}"
              break
            fi
            echo "Tentativa $i falhou: $RESULT"
            sleep 5
          done

      - name: Deploy no Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          for i in 1 2 3; do
            RESULT=$(curl -s -X POST "${DOKPLOY_URL}/api/trpc/compose.deploy" \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${DOKPLOY_API_KEY}" \
              --connect-timeout 15 --max-time 60 \
              -d "{\"json\":{\"composeId\":\"${DOKPLOY_COMPOSE_ID}\"}}")

            if echo "$RESULT" | jq -e '.result' > /dev/null 2>&1; then
              echo "Deploy disparado com sucesso"
              break
            fi
            echo "Tentativa $i falhou: $RESULT"
            sleep 5
          done

      - name: Aguardar ERP responder com novo commit
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          echo "Aguardando ERP subir com commit ${SHORT}..."
          for i in $(seq 1 30); do
            DEPLOYED=$(curl -sf https://erp.eixoglobal.com.br/api/version 2>/dev/null | jq -r '.commit // ""' 2>/dev/null || echo "")
            if [ "$DEPLOYED" = "$SHORT" ]; then
              echo "ERP online com commit ${DEPLOYED}"
              exit 0
            fi
            echo "Aguardando... (${i}/30) — commit atual: ${DEPLOYED:-indisponivel}"
            sleep 15
          done
          echo "AVISO: timeout (7min) aguardando deploy."
          exit 1
