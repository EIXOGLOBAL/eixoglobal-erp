name: Daily AI System Analysis

on:
  schedule:
    # Every day at 6 AM UTC (3 AM BRT / 2 AM BRST)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Health Check
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "APP_URL not configured. Skipping health check."
            exit 0
          fi

          echo "Running daily AI health check..."

          curl -X GET "${{ secrets.APP_URL }}/api/ai/health" \
            -H "Authorization: Bearer ${{ secrets.AI_CRON_SECRET }}" \
            -H "Accept: application/json" \
            --max-time 300 \
            --retry 2 \
            --retry-delay 5 \
            -w "\nHTTP Status: %{http_code}\n" \
            -o health-check-response.json

          echo ""
          echo "Health check completed. Response:"
          cat health-check-response.json || echo "No response received"

      - name: Check Response Status
        run: |
          if [ -f health-check-response.json ]; then
            if grep -q '"success":true' health-check-response.json; then
              echo "✓ Health check completed successfully"
              cat health-check-response.json
            else
              echo "⚠ Health check completed with warnings"
              cat health-check-response.json
            fi
          fi

  # Optional: Send notification on failure
  notify-failure:
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()
    steps:
      - name: Send Slack Notification (Optional)
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
            curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
              -H 'Content-Type: application/json' \
              -d '{
                "text": "⚠ Daily AI health check failed",
                "attachments": [{
                  "color": "warning",
                  "fields": [
                    {"title": "Job", "value": "Daily AI System Analysis", "short": true},
                    {"title": "Status", "value": "Failed", "short": true},
                    {"title": "Run", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                  ]
                }]
              }'
          fi
